# Seed Specification Template
# Generated by /panel --mode=interview
#
# This template is used by The Codifier to structure requirements
# gathered through The Questioner and validated by The Examiner.

goal: |
  # Clear, single-sentence statement of primary objective.
  # Example: "Build a REST API for task management with JWT authentication."

constraints:
  # Hard limitations that cannot be violated
  # - Technology requirements (language, framework, version)
  # - Infrastructure constraints (no external DB, must containerize)
  # - Scale requirements (expected load, data volume)
  # - Time/resource constraints

acceptance_criteria:
  # Measurable success criteria - each should be testable
  # - "Tasks can be created via POST /tasks"
  # - "Response time < 200ms for all endpoints"
  # - "Test coverage >= 80%"

ontology_schema:
  name: ""
  description: ""
  entities:
    - name: ""
      description: ""
      fields:
        - name: ""
          type: ""  # string | number | boolean | array | object
          description: ""
          required: true

evaluation_principles:
  # Quality principles with relative weights (sum to 1.0)
  - principle: ""
    description: ""
    weight: 0.0

exit_conditions:
  # When to consider this complete
  # - "All acceptance criteria pass"
  # - "No security vulnerabilities"
  # - "Stakeholder approval received"

metadata:
  version: "1.0"
  created: ""           # ISO-8601 timestamp
  interview_id: ""      # Panel ID from interview session
  examined_by: "The Examiner"
  examination_verdict: ""  # SOUND | REVISE | REFRAME
